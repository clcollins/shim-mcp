services:
  jira:
    base_url: "https://issues.example.com"
    auth:
      type: basic
      username:
        file: "~/.config/claude/claude.json"
        key: '.jira."user-email"'
      token:
        file: "~/.config/claude/claude.json"
        key: ".jira.token"
    headers:
      content-type: "application/json"
      accept: "application/json"

  github:
    base_url: "https://api.github.com"
    auth:
      type: token
      token:
        file: "~/.config/github/token"
    headers:
      accept: "application/vnd.github.v3+json"

  gitlab:
    base_url: "https://gitlab.example.com/api/v4"
    auth:
      type: bearer
      token:
        file: "~/.config/glab-cli/config.yml"
        key: '.hosts."gitlab.example.com".token'

  pagerduty:
    base_url: "https://api.pagerduty.com"
    auth:
      type: header
      header: "Authorization"
      template: "Token token={{.Token}}"
      token:
        env: "PAGERDUTY_TOKEN"
    headers:
      content-type: "application/json"

  ocm:
    base_url: "https://api.openshift.com"
    auth:
      type: bearer
      token:
        file: "~/.config/ocm/ocm.json"
        key: ".access_token"
    headers:
      accept: "application/json"
      content-type: "application/json"

  unifi:
    base_url: "https://192.168.1.1"
    tls_skip_verify: true
    auth:
      type: header
      header: "X-API-KEY"
      template: "{{.Token}}"
      token:
        file: "~/.config/unifi/unifi-bootstrapper.env"
        format: env
        key: "UNIFI_API_KEY"

  ollama:
    base_url: "http://localhost:11434"
    auth:
      type: none
    filters:
      request:
        validate_json_body: true
        auto_content_type: true

  ramalama:
    base_url: "http://localhost:8080"
    auth:
      type: none
    filters:
      request:
        validate_json_body: true
        auto_content_type: true
