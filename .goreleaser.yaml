version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/clcollins/shim-mcp/internal/cli.Version={{.Tag}}
      - -X github.com/clcollins/shim-mcp/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/clcollins/shim-mcp/internal/cli.BuildDate={{.Date}}
    main: ./cmd/shim-mcp
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: clcollins
    name: shim-mcp
